<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' https://media.valorant-api.com data:; script-src 'self';"/>
  <title>evzero scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&family=Unbounded:wght@600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg-0: #050507;
      --bg-1: #0b0b10;
      --white: #f5f5f7;
      --white-dim: #c4c4cf;
      --white-faint: #7c7c89;
      --line: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.12);
      --purple: #a78bfa;
      --green: #7ed99d;
      --red: #e38686;
      --font-display: 'Unbounded', sans-serif;
      --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%;
      background: transparent;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      overflow: hidden;
      user-select: none;
    }
    .frame {
      width: 100%; height: 100%;
      background:
        linear-gradient(180deg, rgba(20, 14, 36, 0.95) 0%, rgba(8, 6, 14, 0.95) 100%);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(167, 139, 250, 0.42);
      border-radius: 10px;
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 12px 40px -10px rgba(0, 0, 0, 0.65);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .titlebar {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4px 0 12px;
      height: 26px;
      border-bottom: 1px solid rgba(167, 139, 250, 0.18);
      background: linear-gradient(180deg, rgba(167, 139, 250, 0.14), rgba(167, 139, 250, 0.04));
      flex: 0 0 auto;
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }
    .brand-mark {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: -0.005em;
    }
    .brand-tag {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--purple);
    }
    .controls {
      -webkit-app-region: no-drag;
      display: flex;
      height: 100%;
    }
    .ctrl-btn {
      width: 26px; height: 100%;
      background: transparent;
      border: 0;
      cursor: pointer;
      color: var(--white-dim);
      display: inline-grid;
      place-items: center;
      transition: background 0.15s, color 0.15s;
    }
    .ctrl-btn:hover { background: rgba(255, 255, 255, 0.08); color: var(--white); }
    .ctrl-close:hover { background: #c43c3c; color: var(--white); }

    .meta {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 8px 14px 6px;
      border-bottom: 1px solid var(--line);
    }
    .meta-map {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    .meta-result {
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .meta-result.win  { color: var(--green); }
    .meta-result.loss { color: var(--red); }
    .meta-mode {
      font-family: var(--font-mono);
      font-size: 8px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--white-faint);
      margin-top: 2px;
    }

    .scoreboard {
      flex: 1;
      overflow-y: auto;
      padding: 6px 8px 10px;
    }
    .scoreboard::-webkit-scrollbar { width: 6px; }
    .scoreboard::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.08); border-radius: 3px; }
    .team {
      margin-top: 6px;
    }
    .team-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 0 6px 4px;
    }
    .team-name {
      font-family: var(--font-mono);
      font-size: 9px;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--white-dim);
    }
    .team-name.win  { color: var(--green); }
    .team-name.loss { color: var(--red); }
    .team-score {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 18px 1fr 32px 48px;
      gap: 6px;
      align-items: center;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 10px;
    }
    .row.self { background: rgba(167, 139, 250, 0.14); }
    .row img {
      width: 18px; height: 18px;
      border-radius: 3px;
      object-fit: cover;
      background: var(--bg-0);
    }
    .row-name {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--white);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row-name .anon { color: var(--white-faint); font-style: italic; }
    .row-acs {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--white-faint);
      text-align: right;
    }
    .row-kda {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--white);
      text-align: right;
    }
    .empty {
      padding: 24px;
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: var(--white-faint);
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="titlebar">
      <div class="brand">
        <span class="brand-mark">evzero</span>
        <span class="brand-tag">/ scoreboard</span>
      </div>
      <div class="controls">
        <button class="ctrl-btn ctrl-close" id="close" title="Close" aria-label="Close">
          <svg viewBox="0 0 16 16" width="11" height="11"><path d="M3.5 3.5l9 9M12.5 3.5l-9 9" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>

    <div class="meta" id="meta" hidden>
      <div>
        <div class="meta-map" id="meta-map">—</div>
        <div class="meta-mode" id="meta-mode">—</div>
      </div>
      <div class="meta-result" id="meta-result">—</div>
    </div>

    <div class="scoreboard" id="scoreboard">
      <div class="empty">Open the tracker, run a search, then click "Show scoreboard overlay" to populate.</div>
    </div>
  </div>

  <script src="scoreboard-overlay.js"></script>
</body>
</html>
