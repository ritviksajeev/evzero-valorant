<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'self';"/>
  <title>evzero crosshair overlay</title>
  <style>
    /* Fully transparent click-through overlay. The whole page is the screen
       and we only paint the crosshair at center. */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
      pointer-events: none;
    }
    .center {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }
    svg { display: block; }
  </style>
</head>
<body>
  <div class="center">
    <svg id="xh" width="200" height="200" viewBox="-100 -100 200 200" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"></svg>
  </div>
  <script src="crosshair-overlay.js"></script>
</body>
</html>
